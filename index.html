<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Exam Platform</title>

<style>
body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
header { background: #020617; padding: 10px; text-align: center; }
.container { display: flex; height: 90vh; }
.left { width: 40%; background: #111827; padding: 10px; }
.right { width: 60%; background: #020617; padding: 10px; }
textarea { width: 100%; height: 60%; background: black; color: #00ffcc; }
button { padding: 10px; margin: 5px; }
#timer { color: red; font-size: 18px; }

#loginPage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

input {
  padding: 10px;
  margin: 5px;
  width: 250px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="roll" placeholder="Roll Number">
  <input type="email" id="email" placeholder="Email">
  <button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="examPage" style="display:none;">
<header>
<h2>Online Coding Test</h2>
<div id="timer">Time Left: 30:00</div>
</header>

<div class="container">
<div class="left">
<h3>Problem</h3>
<div id="problem"></div>
</div>

<div class="right">
<textarea id="code"># Write your code here</textarea><br>
<button onclick="submitCode()">Submit</button>

<h4>Output</h4>
<pre id="output"></pre>

<br><br>
<button ondblclick="askPassword()">Admin Panel</button>
</div>
</div>
</div>

<script>

// ================= PROBLEMS =================
const problems = [
  {title:"Sum",desc:"Input: 2 numbers\nOutput: Sum"},
  {title:"Even Odd",desc:"Check even or odd"},
  {title:"Factorial",desc:"Find factorial"},
  {title:"Prime",desc:"Check prime"},
  {title:"Fibonacci",desc:"Print series"},
  {title:"Reverse",desc:"Reverse number"},
  {title:"Palindrome",desc:"Check palindrome"},
  {title:"Max",desc:"Find max of 3"},
  {title:"Array Sum",desc:"Sum array"},
  {title:"String Length",desc:"Find length"}
];

let selectedProblem;
let currentRoll;

// ================= START EXAM =================
function startExam() {

  let name = document.getElementById("name").value;
  let roll = document.getElementById("roll").value;
  let email = document.getElementById("email").value;

  if(!name || !roll || !email){
    alert("Fill all details");
    return;
  }

  currentRoll = roll;

  // check blocked
  if(localStorage.getItem("blocked_"+roll)){
    alert("You are disqualified!");
    return;
  }

  // assign problem
  if(localStorage.getItem("problem_"+roll)){
    selectedProblem = JSON.parse(localStorage.getItem("problem_"+roll));
  } else {
    let index = Math.floor(Math.random()*problems.length);
    selectedProblem = problems[index];
    localStorage.setItem("problem_"+roll, JSON.stringify(selectedProblem));
  }

  // store user
  let examData = JSON.parse(localStorage.getItem("examData")) || [];

  examData.push({
    name, roll, email,
    login: new Date().toLocaleString(),
    submit: "",
    duration: "",
    blocked: false
  });

  localStorage.setItem("examData", JSON.stringify(examData));

  // show exam
  document.getElementById("loginPage").style.display="none";
  document.getElementById("examPage").style.display="block";

  document.getElementById("problem").innerHTML =
    `<h4>${selectedProblem.title}</h4><pre>${selectedProblem.desc}</pre>`;

  document.documentElement.requestFullscreen();
}

// ================= TIMER =================
let time = 1800;
setInterval(()=>{
  let min = Math.floor(time/60);
  let sec = time%60;
  document.getElementById("timer").innerText = `Time Left: ${min}:${sec}`;
  time--;

  if(time < 0){
    submitCode();
    alert("Time Up!");
  }
},1000);

// ================= SUBMIT =================
function submitCode(){
  let examData = JSON.parse(localStorage.getItem("examData"));

  examData.forEach(user=>{
    if(user.roll === currentRoll){
      user.submit = new Date().toLocaleString();
      user.duration = "Completed";
    }
  });

  localStorage.setItem("examData", JSON.stringify(examData));

  alert("Submitted!");
}

// ================= DISQUALIFY =================
function disqualify(){
  localStorage.setItem("blocked_"+currentRoll, true);

  let examData = JSON.parse(localStorage.getItem("examData"));

  examData.forEach(user=>{
    if(user.roll === currentRoll){
      user.blocked = true;
    }
  });

  localStorage.setItem("examData", JSON.stringify(examData));

  alert("Violation! Exam ended.");
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:20%'>Exam Terminated</h1>";
}

// tab switch
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){
    disqualify();
  }
});

// fullscreen exit
document.addEventListener("fullscreenchange", ()=>{
  if(!document.fullscreenElement){
    disqualify();
  }
});

// disable copy paste
document.addEventListener('copy', e=>e.preventDefault());
document.addEventListener('paste', e=>e.preventDefault());

// ================= ADMIN =================
function askPassword(){
  let pass = prompt("Enter Admin Password:");
  if(pass === "admin123"){
    downloadResults();
  } else {
    alert("Wrong Password");
  }
}

// ================= DOWNLOAD =================
function downloadResults(){

  let data = JSON.parse(localStorage.getItem("examData")) || [];

  let csv = "Name,Roll,Email,Login,Submit,Duration,Blocked\n";

  data.forEach(u=>{
    csv += `${u.name},${u.roll},${u.email},${u.login},${u.submit},${u.duration},${u.blocked}\n`;
  });

  let blob = new Blob([csv], {type:"text/csv"});
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "results.csv";
  a.click();
}

</script>

</body>
</html>
