<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coding Platform</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { display:flex; }
.left { width:40%; padding:10px; }
.right { width:60%; padding:10px; }
textarea { width:100%; height:300px; background:black; color:#00ffcc; }
button { padding:10px; margin:5px; }
</style>

</head>

<body>

<div id="login">
<h2>Login</h2>
<input id="name" placeholder="Name"><br>
<input id="roll" placeholder="Roll"><br>
<input id="email" placeholder="Email"><br>
<button onclick="start()">Start</button>
</div>

<div id="exam" style="display:none;">
<h2 id="problem"></h2>

<select id="language">
<option value="python">Python</option>
<option value="c">C</option>
<option value="cpp">C++</option>
</select>

<textarea id="code"></textarea><br>

<button onclick="submitCode()">Submit</button>

<pre id="output"></pre>

<button ondblclick="admin()">Admin</button>
</div>

<script>

const problems = [
{
  title:"Factorial",
  desc:"Find factorial",
  testcases:[
    {input:"5", output:"120"},
    {input:"4", output:"24"},
    {input:"3", output:"6"},
    {input:"2", output:"2"},
    {input:"1", output:"1"}
  ]
}
];

let selected;
let currentRoll;

function start(){

  let name = nameInput.value;
  let roll = rollInput.value;
  let email = emailInput.value;

  if(name==="organizer" && roll==="0000"){
    let p = prompt("Password");
    if(p==="CybSec"){ download(); return; }
  }

  currentRoll = roll;
  selected = problems[0];

  document.getElementById("login").style.display="none";
  document.getElementById("exam").style.display="block";

  document.getElementById("problem").innerText =
    selected.title + "\n" + selected.desc;
}

async function runCode(input){

  let code = document.getElementById("code").value;
  let language = document.getElementById("language").value;

  let res = await fetch("/api/run",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({code,input,language})
  });

  let data = await res.json();

  if(data.error) return "ERROR: " + data.error;

  return (data.output||"").trim();
}

async function submitCode(){

  let pass=0, fail=0, failList="";

  for(let i=0;i<selected.testcases.length;i++){

    let tc = selected.testcases[i];
    let out = await runCode(tc.input);

    if(out.startsWith("ERROR")){
      fail++;
      failList += `\n${fail}. ERROR:\n${out}\n`;
    }
    else if(out === tc.output){
      pass++;
    }else{
      fail++;
      failList += `\n${fail}. Input:${tc.input}
Expected:${tc.output}
Output:${out}\n`;
    }
  }

  let marks = pass*20;

  output.innerText =
`${pass} testcases passed
${fail} testcases failed

${failList}

Marks: ${marks}`;
}

function admin(){
  let p = prompt("Password");
  if(p==="CybSec") download();
}

function download(){
  alert("Results download logic here");
}

</script>

</body>
</html>
