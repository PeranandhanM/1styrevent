<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Coding Platform</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; }
.container { display:flex; }
.left { width:40%; padding:10px; }
.right { width:60%; padding:10px; }
textarea { width:100%; height:300px; background:black; color:#00ffcc; }
button { padding:10px; margin:5px; }
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="name" placeholder="Name"><br>
<input id="roll" placeholder="Roll"><br>
<input id="email" placeholder="Email"><br>
<button onclick="start()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="exam" style="display:none;">
<h2 id="problem"></h2>

<select id="language">
<option value="python">Python</option>
<option value="c">C</option>
<option value="cpp">C++</option>
</select>

<textarea id="code"># Write your code here</textarea><br>

<button onclick="submitCode()">Submit</button>

<pre id="output"></pre>

<button ondblclick="admin()">Admin Panel</button>
</div>

<script>

// ================= PROBLEMS =================
const problems = [
{
  title:"Factorial",
  desc:"Find factorial of a number",
  testcases:[
    {input:"5", output:"120"},
    {input:"4", output:"24"},
    {input:"3", output:"6"},
    {input:"2", output:"2"},
    {input:"1", output:"1"}
  ]
}
];

let selected;
let currentRoll;

// ================= START EXAM =================
function start(){

  let name = document.getElementById("name").value;
  let roll = document.getElementById("roll").value;
  let email = document.getElementById("email").value;

  if(!name || !roll || !email){
    alert("Fill all details");
    return;
  }

  // ADMIN LOGIN
  if(name==="organizer" && roll==="0000"){
    let p = prompt("Enter Password");
    if(p==="CybSec"){
      alert("Admin Access");
      return;
    } else {
      alert("Wrong Password");
      return;
    }
  }

  currentRoll = roll;
  selected = problems[0];

  document.getElementById("login").style.display="none";
  document.getElementById("exam").style.display="block";

  document.getElementById("problem").innerText =
    selected.title + "\n" + selected.desc;
}

// ================= RUN CODE =================
async function runCode(input){

  let code = document.getElementById("code").value;
  let language = document.getElementById("language").value;

  try{
    let res = await fetch("/api/run",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({code,input,language})
    });

    let data = await res.json();

    if(data.error){
      return "ERROR: " + data.error;
    }

    return (data.output||"").trim();

  }catch{
    return "Execution Error";
  }
}

// ================= SUBMIT =================
async function submitCode(){

  let passed = 0;
  let failed = 0;
  let failedList = "";

  for(let i=0;i<selected.testcases.length;i++){

    let tc = selected.testcases[i];
    let out = await runCode(tc.input);

    if(out.startsWith("ERROR")){
      failed++;
      failedList += `\n${failed}. ERROR:\n${out}\n`;
    }
    else if(out === tc.output){
      passed++;
    }
    else{
      failed++;
      failedList += `\n${failed}. Input: ${tc.input}
Expected: ${tc.output}
Your Output: ${out}\n`;
    }
  }

  let marks = passed * 20;

  document.getElementById("output").innerText =
`${passed} testcases passed
${failed} testcases failed

Failed Testcases:
${failedList}

Total Marks: ${marks}`;

  alert("Submitted!");
}

// ================= ADMIN =================
function admin(){
  let p = prompt("Enter Admin Password");
  if(p==="CybSec"){
    alert("Admin Panel (Add download logic)");
  }
}

</script>

</body>
</html>
