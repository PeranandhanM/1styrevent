<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coding Exam Platform</title>

<style>
body { font-family: Arial; margin: 0; background: #0f172a; color: white; }
header { background: #020617; padding: 10px; text-align: center; }
.container { display: flex; height: 90vh; }
.left { width: 40%; background: #111827; padding: 10px; }
.right { width: 60%; background: #020617; padding: 10px; }
textarea { width: 100%; height: 60%; background: black; color: #00ffcc; }
button { padding: 10px; margin: 5px; }
#timer { color: red; font-size: 18px; }

#loginPage {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

input {
  padding: 10px;
  margin: 5px;
  width: 250px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login</h2>
  <input type="text" id="name" placeholder="Name">
  <input type="text" id="roll" placeholder="Roll Number">
  <input type="email" id="email" placeholder="Email">
  <button onclick="startExam()">Start Exam</button>
</div>

<!-- EXAM -->
<div id="examPage" style="display:none;">
<header>
<h2>Online Coding Test</h2>
<div id="timer">Time Left: 20:00</div>
</header>

<div class="container">
<div class="left">
<h3>Problem</h3>
<div id="problem"></div>
</div>

<div class="right">
<textarea id="code"># Write your Python code here</textarea><br>
<button onclick="submitCode()">Submit</button>

<h4>Output</h4>
<pre id="output"></pre>

<br><br>
<button ondblclick="downloadAdmin()">Admin Panel</button>
</div>
</div>
</div>

<script>

// ================= PROBLEMS =================
const problems = [
{
  title:"Sum",
  desc:"Add two numbers",
  testcases:[
    {input:"2 3", output:"5"},
    {input:"4 5", output:"9"},
    {input:"6 7", output:"13"},
    {input:"1 1", output:"2"},
    {input:"10 20", output:"30"}
  ]
},
{
  title:"Even Odd",
  desc:"Check even or odd",
  testcases:[
    {input:"2", output:"Even"},
    {input:"5", output:"Odd"},
    {input:"10", output:"Even"},
    {input:"7", output:"Odd"},
    {input:"0", output:"Even"}
  ]
}
];

let selectedProblem;
let currentRoll;

// ================= START EXAM =================
function startExam() {

  let name = document.getElementById("name").value;
  let roll = document.getElementById("roll").value;
  let email = document.getElementById("email").value;

  // ADMIN LOGIN
  if(name === "organizer" && roll === "0000"){
    let pass = prompt("Enter Admin Password:");
    if(pass === "CybSec"){
      downloadResults();
      return;
    } else {
      alert("Wrong Password");
      return;
    }
  }

  if(!name || !roll || !email){
    alert("Fill all details");
    return;
  }

  currentRoll = roll;

  if(localStorage.getItem("blocked_"+roll)){
    alert("You are disqualified!");
    return;
  }

  // assign random problem
  if(localStorage.getItem("problem_"+roll)){
    selectedProblem = JSON.parse(localStorage.getItem("problem_"+roll));
  } else {
    let index = Math.floor(Math.random()*problems.length);
    selectedProblem = problems[index];
    localStorage.setItem("problem_"+roll, JSON.stringify(selectedProblem));
  }

  let examData = JSON.parse(localStorage.getItem("examData")) || [];

  examData.push({
    name, roll, email,
    login: new Date().toLocaleString(),
    submit: "",
    duration: "",
    blocked: false,
    marks: 0
  });

  localStorage.setItem("examData", JSON.stringify(examData));

  document.getElementById("loginPage").style.display="none";
  document.getElementById("examPage").style.display="block";

  document.getElementById("problem").innerHTML =
    `<h4>${selectedProblem.title}</h4><pre>${selectedProblem.desc}</pre>`;

  document.documentElement.requestFullscreen();
}

// ================= TIMER =================
let time = 1200;
setInterval(()=>{
  let min = Math.floor(time/60);
  let sec = time%60;
  document.getElementById("timer").innerText = `Time Left: ${min}:${sec}`;
  time--;

  if(time < 0){
    submitCode();
    alert("Time Up!");
  }
},1000);

// ================= RUN CODE =================
async function runCode(input){

  const code = document.getElementById("code").value;

  const res = await fetch("/api/run", {
    method:"POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ code, input })
  });

  const data = await res.json();
  return data.output;
}

// ================= SUBMIT =================
async function submitCode(){

  let resultText = "";
  let marks = 0;

  for(let i=0;i<selectedProblem.testcases.length;i++){

    let tc = selectedProblem.testcases[i];

    let output = await runCode(tc.input);

    if(output.trim() === tc.output.trim()){
      marks += 20;
      resultText += `\nTest Case ${i+1} ✅\n`;
    } else {
      resultText += `\nTest Case ${i+1} ❌\n`;
    }

    resultText += `Input: ${tc.input}\n`;
    resultText += `Expected: ${tc.output}\n`;
    resultText += `Your Output: ${output}\n\n`;
  }

  resultText += "Total Marks: " + marks;

  document.getElementById("output").innerText = resultText;

  let examData = JSON.parse(localStorage.getItem("examData"));

  examData.forEach(user=>{
    if(user.roll === currentRoll){
      user.submit = new Date().toLocaleString();
      user.duration = "Completed";
      user.marks = marks;
    }
  });

  localStorage.setItem("examData", JSON.stringify(examData));

  alert("Submitted!");
}

// ================= ANTI-CHEAT =================
function disqualify(){
  localStorage.setItem("blocked_"+currentRoll, true);
  alert("Violation! Exam ended.");
  document.body.innerHTML = "<h1 style='text-align:center;margin-top:20%'>Exam Terminated</h1>";
}

document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) disqualify();
});

document.addEventListener("fullscreenchange", ()=>{
  if(!document.fullscreenElement) disqualify();
});

// ================= ADMIN DOWNLOAD =================
function downloadAdmin(){
  let pass = prompt("Enter Admin Password:");
  if(pass === "CybSec"){
    downloadResults();
  }
}

function downloadResults(){

  let data = JSON.parse(localStorage.getItem("examData")) || [];

  let csv = "Name,Roll,Email,Login,Submit,Marks,Blocked\n";

  data.forEach(u=>{
    csv += `${u.name},${u.roll},${u.email},${u.login},${u.submit},${u.marks},${u.blocked}\n`;
  });

  let blob = new Blob([csv]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "results.csv";
  a.click();
}

</script>

</body>
</html>
